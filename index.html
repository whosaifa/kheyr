      {/* Collar stripe 2 */}

// ─── NAV ──────────────────────────────────────────────────────────────────

    <>
    <nav style={{
      position:'fixed', top:0, left:0, right:0, zIndex:100,
      padding:'0 32px',
      height:64,

            transition:'color 0.2s',

          background:'none',border:'1px solid rgba(240,234,216,0.2)',
          borderRadius:2,cursor:'pointer',

// ─── TICKER ──────────────────────────────────────────────────────────────

  const items = ['خير','KHEYR','GOODNESS','النور','PREMIUM KIT','الفجر','ARABIC EMBROIDERY','المجد','MODEST LUXURY','خير'];

    <div style={{overflow:'hidden',borderTop:'1px solid rgba(240,234,216,0.08)',borderBottom:'1px solid rgba(240,234,216,0.08)',padding:'12px 0',background:'var(--black)'}}>
      <style>{`@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}`}</style>
      <div style={{display:'flex',animation:'ticker 18s linear infinite',width:'max-content'}}>
        {[...items,...items].map((t,i) => (
          <span key={i} style={{
            fontFamily: t.match(/[\u0600-\u06FF]/) ? 'var(--font-arabic)' : 'var(--font-display)',
            fontSize:14,color:'var(--grey)',letterSpacing:'0.15em',
            padding:'0 28px',whiteSpace:'nowrap',
          }}>{t} <span style={{color:'var(--orange)',margin:'0 4px'}}>·</span></span>
        ))}
      </div>
    </div>
  );
}

// ─── CART DRAWER ──────────────────────────────────────────────────────────
function CartDrawer({ open, onClose, cart, removeFromCart, updateQty }) {
  const total = cart.reduce((s, i) => s + i.product.price * i.qty, 0);

  return (
    <>
      {/* Overlay */}
      <div onClick={onClose} style={{
        position:'fixed',inset:0,zIndex:200,
        background:'rgba(0,0,0,0.6)',
        opacity: open ? 1 : 0,
        pointerEvents: open ? 'all' : 'none',
        transition:'opacity 0.3s',
        backdropFilter:'blur(4px)',
      }}/>
      {/* Drawer */}
      <div style={{
        position:'fixed',right:0,top:0,bottom:0,zIndex:201,
        width:420,
        background:'var(--black)',
        borderLeft:'1px solid rgba(240,234,216,0.08)',
        transform: open ? 'translateX(0)' : 'translateX(100%)',
        transition:'transform 0.4s cubic-bezier(0.16,1,0.3,1)',
        display:'flex',flexDirection:'column',
      }}>
        {/* Header */}
        <div style={{padding:'24px 32px',borderBottom:'1px solid rgba(240,234,216,0.08)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <h2 style={{fontFamily:'var(--font-display)',fontSize:28,color:'var(--cream)',letterSpacing:0}}>YOUR CART</h2>
            <div style={{fontFamily:'var(--font-arabic)',fontSize:14,color:'var(--grey)'}}>سلة التسوق</div>
          </div>
          <button onClick={onClose} style={{background:'none',border:'none',color:'var(--grey)',cursor:'pointer',fontSize:24,lineHeight:1}}>×</button>
        </div>

        {/* Items */}
        <div style={{flex:1,overflowY:'auto',padding:'16px 0'}}>
          {cart.length === 0 ? (
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',gap:16}}>
              <div style={{fontFamily:'var(--font-arabic)',fontSize:72,color:'rgba(200,68,26,0.15)'}}>خير</div>
              <p style={{color:'var(--grey)',fontSize:14}}>Your cart is empty</p>
            </div>
          ) : (
            cart.map((item, i) => (
              <div key={i} style={{
                display:'grid',gridTemplateColumns:'80px 1fr auto',gap:16,
                padding:'16px 32px',
                borderBottom:'1px solid rgba(240,234,216,0.06)',
              }}>
                <div style={{
                  background:item.product.bg,
                  display:'flex',alignItems:'center',justifyContent:'center',
                  padding:8,
                }}>
                  <ShirtSVG product={item.product} size={64}/>
                </div>
                <div>
                  <div style={{fontFamily:'var(--font-display)',fontSize:18,color:'var(--cream)'}}>{item.product.name}</div>
                  <div style={{fontFamily:'var(--font-arabic)',fontSize:12,color:'var(--grey)',marginBottom:8}}>{item.product.arabic}</div>
                  <div style={{display:'flex',gap:8,alignItems:'center'}}>
                    <button onClick={() => updateQty(i, item.qty - 1)} style={{background:'none',border:'1px solid rgba(240,234,216,0.15)',color:'var(--cream)',width:24,height:24,cursor:'pointer',fontSize:14,display:'flex',alignItems:'center',justifyContent:'center'}}>−</button>
                    <span style={{color:'var(--cream)',fontSize:13,minWidth:20,textAlign:'center'}}>{item.qty}</span>
                    <button onClick={() => updateQty(i, item.qty + 1)} style={{background:'none',border:'1px solid rgba(240,234,216,0.15)',color:'var(--cream)',width:24,height:24,cursor:'pointer',fontSize:14,display:'flex',alignItems:'center',justifyContent:'center'}}>+</button>
                  </div>
                </div>
                <div style={{display:'flex',flexDirection:'column',justifyContent:'space-between',alignItems:'flex-end'}}>
                  <span style={{fontFamily:'var(--font-display)',fontSize:20,color:'var(--cream)'}}>£{item.product.price * item.qty}</span>
                  <button onClick={() => removeFromCart(i)} style={{background:'none',border:'none',color:'var(--grey)',cursor:'pointer',fontSize:11,letterSpacing:'0.05em',fontFamily:'var(--font-body)'}}>REMOVE</button>
                </div>
              </div>
            ))
          )}
        </div>

        {/* Footer */}
        {cart.length > 0 && (
          <div style={{padding:'24px 32px',borderTop:'1px solid rgba(240,234,216,0.08)'}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
              <span style={{color:'var(--grey)',fontSize:13}}>Subtotal</span>
              <span style={{fontFamily:'var(--font-display)',fontSize:24,color:'var(--cream)'}}>£{total}</span>
            </div>
            {total >= 150 && <p style={{color:'#2d7a4f',fontSize:12,marginBottom:16}}>✓ You qualify for free UK shipping</p>}
            {total < 150 && <p style={{color:'var(--grey)',fontSize:12,marginBottom:16}}>Add £{150 - total} more for free UK shipping</p>}
            <button style={{
              width:'100%',background:'var(--orange)',border:'none',color:'var(--cream)',
              fontFamily:'var(--font-display)',fontSize:16,letterSpacing:'0.12em',
              padding:'18px',cursor:'pointer',marginBottom:8,
              transition:'opacity 0.2s',
            }}
            onMouseEnter={e=>e.currentTarget.style.opacity='0.85'}
            onMouseLeave={e=>e.currentTarget.style.opacity='1'}
            >CHECKOUT — £{total}</button>
            <button onClick={onClose} style={{
              width:'100%',background:'none',border:'1px solid rgba(240,234,216,0.1)',color:'var(--grey)',
              fontFamily:'var(--font-body)',fontSize:12,letterSpacing:'0.05em',
              padding:'12px',cursor:'pointer',
            }}>CONTINUE SHOPPING</button>
          </div>
        )}
      </div>
    </>
  );
}

// ─── TWEAKS ──────────────────────────────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#C8441A",
  "darkMode": true,
  "fontDisplay": "Bebas Neue"
}/*EDITMODE-END*/;

function TweaksPanel({ visible, tweaks, setTweaks }) {
  if (!visible) return null;
  return (
    <div style={{
      position:'fixed',bottom:24,right:24,zIndex:300,
      background:'#1a1814',border:'1px solid rgba(240,234,216,0.12)',
      width:260,padding:24,
      boxShadow:'0 24px 48px rgba(0,0,0,0.5)',
    }}>
      <div style={{fontFamily:'var(--font-display)',fontSize:14,color:'var(--cream)',letterSpacing:'0.1em',marginBottom:20}}>TWEAKS</div>
      <div style={{display:'flex',flexDirection:'column',gap:20}}>
        <div>
          <label style={{color:'var(--grey)',fontSize:11,letterSpacing:'0.1em',textTransform:'uppercase',display:'block',marginBottom:8}}>Accent Color</label>
          <div style={{display:'flex',gap:8}}>
            {['#C8441A','#1a6bc8','#2d7a4f','#8B4AAF'].map(c => (
              <button key={c} onClick={() => {
                setTweaks({...tweaks, accentColor: c});
                document.documentElement.style.setProperty('--orange', c);
                window.parent.postMessage({type:'__edit_mode_set_keys', edits:{accentColor:c}},'*');
              }} style={{
                width:32,height:32,background:c,border:`2px solid ${tweaks.accentColor===c?'var(--cream)':'transparent'}`,cursor:'pointer',
              }}/>
            ))}
          </div>
        </div>
        <div>
          <label style={{color:'var(--grey)',fontSize:11,letterSpacing:'0.1em',textTransform:'uppercase',display:'block',marginBottom:8}}>Display Font</label>
          {['Bebas Neue','Impact','Georgia'].map(f => (
            <button key={f} onClick={() => {
              setTweaks({...tweaks, fontDisplay: f});
              document.documentElement.style.setProperty('--font-display', `'${f}', sans-serif`);
              window.parent.postMessage({type:'__edit_mode_set_keys', edits:{fontDisplay:f}},'*');
            }} style={{
              display:'block',width:'100%',marginBottom:4,
              background: tweaks.fontDisplay===f ? 'rgba(240,234,216,0.08)' : 'none',
              border:'1px solid',borderColor: tweaks.fontDisplay===f ? 'rgba(240,234,216,0.2)' : 'transparent',
              color: tweaks.fontDisplay===f ? 'var(--cream)' : 'var(--grey)',
              fontFamily:`'${f}',sans-serif`,fontSize:14,padding:'6px 12px',
              cursor:'pointer',textAlign:'left',transition:'all 0.2s',
            }}>{f}</button>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────
function App() {
  const [page, setPage] = useState('home');
  const [selectedProduct, setSelectedProduct] = useState(null);
  const [cart, setCart] = useState([]);
  const [cartOpen, setCartOpen] = useState(false);
  const [tweaksVisible, setTweaksVisible] = useState(false);
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);

  // Tweaks setup
  useEffect(() => {
    document.documentElement.style.setProperty('--orange', tweaks.accentColor);
    document.documentElement.style.setProperty('--font-display', `'${tweaks.fontDisplay}', sans-serif`);
  }, []);

  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksVisible(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const addToCart = (product, qty = 1) => {
    setCart(prev => {
      const idx = prev.findIndex(i => i.product.id === product.id);
      if (idx >= 0) {
        const next = [...prev];
        next[idx] = { ...next[idx], qty: next[idx].qty + qty };
        return next;
      }
      return [...prev, { product, qty }];
    });
  };

  const removeFromCart = (idx) => setCart(prev => prev.filter((_,i) => i !== idx));
  const updateQty = (idx, qty) => {
    if (qty <= 0) { removeFromCart(idx); return; }
    setCart(prev => prev.map((item, i) => i === idx ? { ...item, qty } : item));
  };

  const cartCount = cart.reduce((s, i) => s + i.qty, 0);

  return (
    <div>
      <Nav page={page} setPage={setPage} cartCount={cartCount} setCartOpen={setCartOpen}/>

      {page === 'home' && <HomePage setPage={setPage} setSelectedProduct={setSelectedProduct} addToCart={addToCart}/>}
      {page === 'shop' && <ShopPage setPage={setPage} setSelectedProduct={setSelectedProduct} addToCart={addToCart}/>}
      {page === 'product' && <ProductPage product={selectedProduct || PRODUCTS[0]} setPage={setPage} addToCart={addToCart}/>}
      {page === 'about' && <AboutPage setPage={setPage}/>}

      <CartDrawer open={cartOpen} onClose={() => setCartOpen(false)} cart={cart} removeFromCart={removeFromCart} updateQty={updateQty}/>
      <TweaksPanel visible={tweaksVisible} tweaks={tweaks} setTweaks={setTweaks}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
